<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Budget UK &mdash; Legal</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.65;color:#14365D;background:#fafafa;padding:60px 20px;min-height:100vh}
  .wrap{max-width:480px;margin:0 auto;background:#fff;padding:48px 40px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.06);text-align:center}
  .logo{width:64px;height:64px;background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:16px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px;letter-spacing:-0.5px}
  h1{font-size:24px;color:#14365D;margin-bottom:8px;font-weight:700}
  p{font-size:15px;color:#666;margin-bottom:28px}
  .links{display:flex;flex-direction:column;gap:10px}
  a{display:block;padding:14px 20px;background:#F5F0FF;color:#7C3AED;text-decoration:none;border-radius:8px;font-weight:600;font-size:15px;transition:all 0.15s}
  a:hover{background:#7C3AED;color:#fff}
  .footer{margin-top:32px;font-size:12px;color:#999}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">DB</div>
  <h1>Daily Budget UK</h1>
  <p>Legal documents for the Daily Budget UK iOS app.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Use</a>
  </div>
  <div class="footer">&copy; 2026 Mark Holmes</div>
</div>
</body>
</html>
